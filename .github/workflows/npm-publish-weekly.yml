name: Publish Weekly Package

on:
    workflow_call:

jobs:
    publish-npm-weekly:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            actions: read
            id-token: write # Required for OpenID Connect (OIDC) for trusted publishing on NPM
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: develop # Checkout the develop branch
            
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org'

            - name: Install root dependencies
              run: npm install --ignore-scripts

            - name: Copy LICENSE to adyen-salesforce-pwa package
              run: cp LICENSE packages/adyen-salesforce-pwa/

            - name: Copy env example file to adyen-salesforce-pwa package
              run: cp packages/adyen-retail-react-app/.env.example packages/adyen-salesforce-pwa/

            - name: Install package dependencies
              run: cd packages/adyen-salesforce-pwa/ && npm install --ignore-scripts

            - name: Update version for weekly build
              run: |
                  cd packages/adyen-salesforce-pwa/
                  BASE_VERSION=$(node -p "require('./package.json').version")
                  TIMESTAMP=$(date +%Y%m%d%H%M%S)
                  NEW_VERSION="${BASE_VERSION}-weekly-${TIMESTAMP}"
                  echo "Updating version to ${NEW_VERSION}"
                  npm version ${NEW_VERSION} --no-git-tag-version

            - name: Build package
              run: cd packages/adyen-salesforce-pwa/ && npm run build-prod

            - name: Publish weekly package
              run: cd packages/adyen-salesforce-pwa/ && npm publish --tag weekly --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Fallback if OIDC isn't fully configured, though id-token should handle it if trusted publishing is set up.
